name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedTag = "v$packageVersion"
          $actualTag = "${{ github.ref_name }}"

          if ($actualTag -ne $expectedTag) {
            Write-Error "Tag $actualTag does not match package.json version $packageVersion. Expected tag: $expectedTag"
            exit 1
          }

      - name: Build renderer and main process
        run: npm run build

      - name: Build and publish Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
