name: Release

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: write

jobs:
    release-windows:
        name: Build and publish Windows release
        runs-on: windows-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 22
                    cache: npm

            -   name: Restore Electron caches
                uses: actions/cache@v4
                with:
                    path: |
                        ~\AppData\Local\electron\Cache
                        ~\AppData\Local\electron-builder\Cache
                    key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
                    restore-keys: |
                        ${{ runner.os }}-electron-

            -   name: Install dependencies
                run: npm ci

            -   name: Read package version
                id: package
                shell: pwsh
                run: |
                    $packageVersion = node -p "require('./package.json').version"
                    "version=$packageVersion" >> $env:GITHUB_OUTPUT

            -   name: Verify tag matches package version
                shell: pwsh
                run: |
                    $packageVersion = "${{ steps.package.outputs.version }}"
                    $expectedTag = "v$packageVersion"
                    $actualTag = "${{ github.ref_name }}"

                    if ($actualTag -ne $expectedTag) {
                      Write-Error "Tag $actualTag does not match package.json version $packageVersion. Expected tag: $expectedTag"
                      exit 1
                    }

            -   name: Build renderer and main process
                run: npm run build

            -   name: Build Windows installer
                run: npx electron-builder --win --publish never

            -   name: Verify release files
                shell: pwsh
                run: |
                    $requiredFiles = @(
                      (Get-ChildItem -Path dist -Filter '*-setup.exe' -File),
                      (Get-ChildItem -Path dist -Filter '*.exe.blockmap' -File),
                      (Get-ChildItem -Path dist -Filter 'latest.yml' -File)
                    )

                    foreach ($entry in $requiredFiles) {
                      if ($null -eq $entry -or $entry.Count -eq 0) {
                        Write-Error 'Missing required release artifact. Expected setup.exe, setup.exe.blockmap and latest.yml in dist/.'
                        Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length
                        exit 1
                      }
                    }

                    Get-ChildItem -Path dist -File | Format-Table Name, Length

            -   name: Generate release notes
                shell: pwsh
                run: |
                    $currentTag = "${{ github.ref_name }}"

                    $previousTag = git tag --list "v*.*.*" --sort=-v:refname |
                      Where-Object { $_ -ne $currentTag } |
                      Select-Object -First 1

                    "# $currentTag" | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8
                    "" | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append

                    if ($previousTag) {
                      "Changes since ``$previousTag``:" | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append
                      "" | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append

                      git log "$previousTag..$currentTag" --pretty=format:"- %s (`%h`)" |
                        Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append

                      "" | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append
                      "" | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append
                      "[Full changelog](https://github.com/${{ github.repository }}/compare/$previousTag...$currentTag)" |
                        Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append
                    } else {
                      "Initial release." | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8 -Append
                    }

                    Get-Content RELEASE_NOTES.md

            -   name: Publish GitHub release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: ${{ github.ref_name }}
                    name: ${{ steps.package.outputs.version }}
                    body_path: RELEASE_NOTES.md
                    draft: false
                    prerelease: false
                    files: |
                        dist/*-setup.exe
                        dist/*-setup.exe.blockmap
                        dist/latest.yml
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
